# Farm Data Workflow — Paddock Configuration
# Edit this file for each run. Do not hardcode values in scripts.
# All paths are relative to the project root unless absolute.

# -----------------------------------------
# RUN METADATA
# -----------------------------------------
run:
  paddock_id: "WALGON"            # Must match folder/file naming convention
  paddock_name: "WALGON"          # Human-readable name; must match Field
                                   # description in the CN1/ADAPT catalog and
                                   # FIELD_NAME in boundary_shp
  farm_name: "WALGON"
  season: "2024"
  crop: "wheat"                   # wheat | barley | canola | pulse
  operator: "Barry"
  run_date: null                  # Set automatically at runtime (ISO 8601)
  run_notes: ""                   # Optional free text for this run

# -----------------------------------------
# INPUT FILES
# -----------------------------------------
inputs:
  cn1_path: "data/raw/yield/260406O2.CN1"   # extracted CN1 folder (not a zip)
  protein_csv: "data/raw/protein/<filename>.csv"
  boundary_shp: "data/raw/boundaries/fields.shp"

# -----------------------------------------
# PROTEIN CSV COLUMN MAPPING
# CropScan field names vary - set these to match your actual CSV headers
# -----------------------------------------
protein_columns:
  latitude: "Latitude"
  longitude: "Longitude"
  protein: "Protein"
  moisture: null
  timestamp: null

# -----------------------------------------
# COORDINATE REFERENCE SYSTEM
# -----------------------------------------
crs:
  input_gps: "EPSG:4326"       # WGS84 - GPS input data
  project: "EPSG:28350"        # GDA94 / MGA Zone 50 - WA wheatbelt default
  # Zone 50 covers 114-120E. Change to 28351 (Zone 51) if paddock > 120E.

# -----------------------------------------
# INGEST / VALIDATION PARAMETERS
# -----------------------------------------
ingest:
  boundary_buffer_m: 30          # tolerance for GPS noise at field edges
  max_outside_boundary_pct: 5    # warn if more than this % of points fall outside

# -----------------------------------------
# YIELD CLEANING PARAMETERS
# -----------------------------------------
yield_cleaning:
  machine_id_field: "machine_id" # Set by 00_cn1_to_points.py from CN1 SDK
  machine_offset_warn_pct: 15    # Flag offset > this % of grand mean
  speed_min_kmh: 3.0
  speed_max_kmh: 12.0
  yield_lower_pct: 2
  yield_upper_pct: 98
  outlier_stdevs: 3               # pyprecag stdevs param (iterative trim threshold)
  thin_dist_m: 1.0                 # pyprecag thin_dist_m param (min point spacing)

# -----------------------------------------
# PROTEIN CLEANING PARAMETERS
# -----------------------------------------
protein_cleaning:
  protein_min_pct: 5.0
  protein_max_pct: 25.0
  zscore_flag_threshold: 3.0

# -----------------------------------------
# RASTER / INTERPOLATION PARAMETERS
# -----------------------------------------
raster:
  resolution_m: 10
  interpolation_method: "vesper"  # vesper | pykrige
  kriging_type: "local"

# -----------------------------------------
# ZONE DELINEATION PARAMETERS
# -----------------------------------------
zones:
  n_zones: 3
  min_zone_area_ha: 2.0
  random_seed: 42

# -----------------------------------------
# PRESCRIPTION PARAMETERS
# -----------------------------------------
prescription:
  input_type: "nitrogen"
  rate_unit: "kg/ha"
  rate_field_name: "RATE"
  default_rate_field: "DEF_RATE"
  min_rate_field: "MIN_RATE"
  max_rate_field: "MAX_RATE"
  default_rate: null
  min_rate: 0
  max_rate: 200

# -----------------------------------------
# OUTPUT PATHS
# -----------------------------------------
outputs:
  processed_yield: "data/processed/yield/"
  processed_protein: "data/processed/protein/"
  rasters: "data/processed/rasters/"
  zones: "data/outputs/zones/"
  handoff: "data/outputs/handoff/"
  prescriptions: "data/outputs/prescriptions/"
  logs: "logs/"
